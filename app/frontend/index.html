<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════════
         FAVICONS — gera o logo nos resultados de busca
         Gere os arquivos em: https://realfavicongenerator.net
    ════════════════════════════════════════════════ -->
    <link rel="icon"             type="image/x-icon"     href="/favicon.ico" />
    <link rel="icon"             type="image/svg+xml"                         href="/favicon.svg" />
    <link rel="icon"             type="image/png" sizes="96x96"  href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180"                  href="/apple-touch-icon.png" />
    <link rel="manifest"                                          href="/site.webmanifest" />
    <meta name="theme-color" content="#2563eb" />

    <!-- ═══════════════════════════════════════════════
         SEO BASE — sobrescrito dinamicamente pelo useSeo
    ════════════════════════════════════════════════ -->
    <title>quemvota — Transparência Legislativa Brasileira</title>
    <meta name="description"
          content="Acompanhe o que seus deputados federais fazem no Congresso. Gastos, votações, presença e performance — dados oficiais, sem viés." />
    <meta name="robots" content="index, follow" />
    <meta name="author"  content="quemvota" />

    <!-- ═══════════════════════════════════════════════
         OPEN GRAPH BASE (fallback antes do JS carregar)
    ════════════════════════════════════════════════ -->
    <meta property="og:site_name"   content="quemvota" />
    <meta property="og:type"        content="website" />
    <meta property="og:locale"      content="pt_BR" />
    <meta property="og:url"         content="https://www.quemvota.com.br" />
    <meta property="og:title"       content="quemvota — Transparência Legislativa Brasileira" />
    <meta property="og:description" content="Acompanhe o que seus deputados federais fazem no Congresso. Dados oficiais, sem viés." />
    <meta property="og:image"       content="https://www.quemvota.com.br/og-default.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ═══════════════════════════════════════════════
         TWITTER CARD BASE
    ════════════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@quemvota" />
    <meta name="twitter:title"       content="quemvota — Transparência Legislativa Brasileira" />
    <meta name="twitter:description" content="Acompanhe o que seus deputados federais fazem no Congresso." />
    <meta name="twitter:image"       content="https://www.quemvota.com.br/og-default.png" />

    <!-- ═══════════════════════════════════════════════
         JSON-LD — WebSite schema (rich snippet Google)
    ════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "quemvota",
      "url": "https://www.quemvota.com.br",
      "description": "Plataforma independente de transparência legislativa brasileira.",
      "inLanguage": "pt-BR",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.quemvota.com.br/politicos?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
