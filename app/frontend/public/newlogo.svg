    <circle cx="45" cy="45" r="18" fill="#1E3A8A" />
    
    <rect x="32" y="43" width="26" height="4" fill="white" rx="2" />
    
    <line x1="70" y1="70" x2="92" y2="92" stroke="#1E3A8A" stroke-width="10" stroke-linecap="round" />
  </g>
</svg>
