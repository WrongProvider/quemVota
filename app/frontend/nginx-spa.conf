# app/frontend/nginx-spa.conf
# nginx interno do container frontend.
# ATENÇÃO: existe uma pasta física /usr/share/nginx/html/politicos/
# com as fotos dos deputados (politicos/540.jpg etc).
# A ordem das locations é crítica para não conflitar com as rotas do React Router.

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Sem redirect absoluto — evita vazar host:porta interno nos redirects
    absolute_redirect off;

    # ── Assets estáticos com hash (gerados pelo Vite) ─────────────────────────
    location ~* \.(js|css|svg|ico|woff|woff2|ttf|eot|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── React Router SPA ──────────────────────────────────────────────────────
    # SEM $uri/ — impede que o nginx tente resolver /politicos como diretório
    # físico antes de cair no index.html.
    location / {
        try_files $uri /index.html;
    }

    # ── Bloqueia arquivos ocultos ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}